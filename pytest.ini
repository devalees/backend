[pytest]
DJANGO_SETTINGS_MODULE = Apps.core.settings
python_files = test_*.py *_test.py *_tests.py
python_classes = Test* *Test *Tests *TestCase
python_functions = test_*
addopts = 
    --reuse-db 
    -v 
    --import-mode=importlib 
    --no-migrations 
    --ds=Apps.core.settings
    --tb=short
testpaths = 
    Apps/contact/tests
    Apps/entity/tests
    Apps/field_control/tests
    Apps/users/tests
norecursedirs = 
    venv 
    .git 
    .pytest_cache 
    __pycache__ 
    static 
    templates 
    migrations
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::RuntimeWarning
    ignore::django.utils.deprecation.RemovedInDjango60Warning
django_find_project = false
pythonpath = 
    .
    Apps
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    views: marks view tests
    models: marks model tests
    forms: marks form tests
    urls: marks url tests
    api: marks api tests 