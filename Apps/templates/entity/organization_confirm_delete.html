{% extends "entity/base.html" %}

{% block title %}Delete {{ organization.name }}{% endblock %}

{% block content %}
<div class="container">
    <h1>Delete Organization</h1>
    <p>Are you sure you want to delete "{{ organization.name }}"?</p>
    <p>This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'entity:organization_detail' pk=organization.pk %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
